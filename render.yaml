services:
  - type: web
    name: work-order-system
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: work-order-data
      mountPath: /var/data
      sizeGB: 1
